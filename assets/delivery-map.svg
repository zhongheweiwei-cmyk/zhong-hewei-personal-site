  <g font-family="Inter,Arial,sans-serif">
    <rect x="72" y="196" width="208" height="116" rx="20" fill="#f7f3ea"/>
    <text x="102" y="239" font-size="21" font-weight="700" fill="#20251f">需求评审</text>
    <text x="102" y="273" font-size="15" fill="#596158">把业务目标拆成页面、接口、流程和数据合约</text>
    <rect x="330" y="196" width="208" height="116" rx="20" fill="#f7f3ea"/>
