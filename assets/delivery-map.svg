<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720" role="img" aria-labelledby="title desc">
  <title id="title">AI application delivery map</title>
  <desc id="desc">Map of AI application engineering capabilities from business ambiguity to shipped systems.</desc>
  <rect width="1100" height="720" rx="36" fill="#20251f"/>
