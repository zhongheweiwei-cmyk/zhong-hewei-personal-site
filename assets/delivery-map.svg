    <text x="110" y="493" font-size="18" fill="#dfe8d6">LLM 内容适配系统 · Vision LLM 教学助手 · 本地投资决策工作台 · 短视频 AIGC 流水线</text>
    <text x="110" y="532" font-size="18" fill="#dfe8d6">社媒运营自动化 · 小红书数据追踪 · GEO 官网 · 桌面视觉识别告警</text>
