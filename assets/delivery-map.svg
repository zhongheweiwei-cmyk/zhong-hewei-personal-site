    <text x="360" y="273" font-size="15" fill="#596158">Prompt / JSON Schema / Provider 抽象 / 校验</text>
    <rect x="588" y="196" width="208" height="116" rx="20" fill="#f7f3ea"/>
    <text x="618" y="239" font-size="21" font-weight="700" fill="#20251f">全栈实现</text>
    <text x="618" y="273" font-size="15" fill="#596158">Python / FastAPI / React / Next.js / Node</text>
    <rect x="846" y="196" width="182" height="116" rx="20" fill="#d9b35f"/>
    <text x="876" y="239" font-size="21" font-weight="700" fill="#20251f">部署验收</text>
    <text x="876" y="273" font-size="15" fill="#20251f">本机、Vercel、云函数、局域网工具</text>
    <path d="M280 254h38" stroke="#8ca66b" stroke-width="5" stroke-linecap="round"/>
    <path d="M538 254h38" stroke="#8ca66b" stroke-width="5" stroke-linecap="round"/>
    <path d="M796 254h38" stroke="#8ca66b" stroke-width="5" stroke-linecap="round"/>
    <rect x="72" y="392" width="956" height="190" rx="26" fill="#2d342b" stroke="#55624d"/>
